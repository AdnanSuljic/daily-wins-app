services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    ports:
      - "5434:5432"
    networks:
      - daily-wins-network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: always
    networks:
      - daily-wins-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    command: npm run dev --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    networks:
      - daily-wins-network
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}

volumes:
  postgres_data:

networks:
  daily-wins-network:
    driver: bridge